name: PhotoWing
options:
  bundleIdPrefix: com.photowing
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: PhotoWing/Resources/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  PhotoWing:
    type: application
    platform: iOS
    sources:
      - path: PhotoWing
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.photowing.app
        INFOPLIST_FILE: PhotoWing/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
    info:
      path: PhotoWing/Resources/Info.plist
